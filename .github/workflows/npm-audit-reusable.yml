name: NPM Audit Automation (Recursive - Hybrid Optimized)

on:
  workflow_call:
    inputs:
      enable_auto_merge:
        description: Enable PR auto-merge after checks pass.
        required: false
        type: boolean
        default: false
      jira_story:
        description: Optional JIRA story key to prefix the PR title (for example, SAT-258381).
        required: false
        type: string
        default: ''

jobs:
  audit-and-fix:
    runs-on: ubuntu-latest

    concurrency:
      group: npm-audit-${{ github.repository }}
      cancel-in-progress: true

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Audit, fix, override and validate services
        id: fix
        run: |
          set -euo pipefail

          echo "Starting npm audit remediation..."

          ANY_CHANGES=false
          SUMMARY_FILE=$(mktemp)
          echo "### Services Updated" > "$SUMMARY_FILE"
          echo "" >> "$SUMMARY_FILE"

          for file in $(find ./services -type f -name 'package.json' -not -path '*/node_modules/*'); do
            SERVICE_DIR=$(dirname "$file")

            echo "--------------------------------------"
            echo "Processing $SERVICE_DIR"
            echo "--------------------------------------"

            pushd "$SERVICE_DIR" > /dev/null

            if [ ! -f package-lock.json ]; then
              echo "No package-lock.json found. Skipping."
              popd > /dev/null
              continue
            fi

            ORIGINAL_PKG=$(mktemp)
            cp package.json "$ORIGINAL_PKG"

            if jq -e 'has("overrides")' package.json > /dev/null; then
              echo "Removing existing overrides before audit remediation."
              jq 'del(.overrides)' package.json > package.tmp.json && mv package.tmp.json package.json
              npm install
            else
              echo "No existing overrides to remove."
              npm ci
            fi

            AUDIT_FILE=$(mktemp)
            DIRECT_FILE=$(mktemp)
            OVERRIDE_CANDIDATES_FILE=$(mktemp)

            echo "--------------------------------------"
            echo "Initial audit check"
            echo "--------------------------------------"

            npm audit --json > "$AUDIT_FILE" || true
            TOTAL=$(jq '.metadata.vulnerabilities.total' "$AUDIT_FILE")

            if [ "$TOTAL" -eq 0 ]; then
              echo "No vulnerabilities found. Skipping service."
              rm -f "$AUDIT_FILE" "$DIRECT_FILE" "$OVERRIDE_CANDIDATES_FILE" "$ORIGINAL_PKG"
              popd > /dev/null
              continue
            fi

            echo "--------------------------------------"
            echo "1. Safe fix"
            echo "--------------------------------------"

            npm audit fix || true

            npm audit --json > "$AUDIT_FILE" || true
            TOTAL=$(jq '.metadata.vulnerabilities.total' "$AUDIT_FILE")

            if [ "$TOTAL" -gt 0 ]; then
              echo "--------------------------------------"
              echo "2. Force fix (devDependencies only)"
              echo "--------------------------------------"

              ALLOW_FORCE=true

              jq -r '
                .vulnerabilities
                | to_entries[]
                | select(.value.isDirect == true)
                | .key
              ' "$AUDIT_FILE" > "$DIRECT_FILE"

              if [ -s "$DIRECT_FILE" ]; then
                while read -r PKG; do
                  if jq -e --arg pkg "$PKG" '.devDependencies | has($pkg)' package.json > /dev/null; then
                    echo "$PKG is devDependency."
                  else
                    echo "$PKG is production dependency. Blocking force fix."
                    ALLOW_FORCE=false
                  fi
                done < "$DIRECT_FILE"
              fi

              if [ "$ALLOW_FORCE" = true ]; then
                npm audit fix --force || true
              else
                echo "Force fix skipped."
              fi
            fi

            npm audit --json > "$AUDIT_FILE" || true
            TOTAL=$(jq '.metadata.vulnerabilities.total' "$AUDIT_FILE")

            if [ "$TOTAL" -gt 0 ]; then
              echo "--------------------------------------"
              echo "3. Dynamic override (transitive dependencies only)"
              echo "--------------------------------------"

              OVERRIDE_APPLIED=false

              jq -r '
                .vulnerabilities
                | to_entries[]
                | select(.value.fixAvailable == true and .value.isDirect == false)
                | .key
              ' "$AUDIT_FILE" > "$OVERRIDE_CANDIDATES_FILE"

              if [ -s "$OVERRIDE_CANDIDATES_FILE" ]; then
                echo "Found transitive override candidates from audit report."
                while read -r PKG; do
                  if jq -e --arg pkg "$PKG" '.dependencies | has($pkg)' package.json > /dev/null; then
                    echo "$PKG is a production dependency. Skipping override."
                    continue
                  fi

                  if jq -e --arg pkg "$PKG" '.devDependencies | has($pkg)' package.json > /dev/null; then
                    echo "$PKG is a direct devDependency. Skipping override."
                    continue
                  fi

                  LATEST=$(npm view "$PKG" version 2>/dev/null || true)
                  if [ -n "$LATEST" ]; then
                    echo "Override $PKG -> ^$LATEST"
                    jq --arg pkg "$PKG" --arg ver "^$LATEST" \
                      '(.overrides //= {}) | .overrides[$pkg]=$ver' \
                      package.json > package.tmp.json && mv package.tmp.json package.json
                    OVERRIDE_APPLIED=true
                  fi
                done < "$OVERRIDE_CANDIDATES_FILE"

                if [ "$OVERRIDE_APPLIED" = true ]; then
                  echo "Reinstalling with overrides..."
                  npm install
                else
                  echo "No overrides applied. Skipping reinstall."
                fi
              else
                echo "No override candidates."
              fi
            fi

            echo "--------------------------------------"
            echo "3.5 Prevent direct dependency downgrades"
            echo "--------------------------------------"

            DOWNGRADE_DETECTED=false
            DOWNGRADE_ENTRIES=$(jq -r --slurpfile old "$ORIGINAL_PKG" '
              def changed_specs(section):
                ($old[0][section] // {}) as $o |
                (. [section] // {}) as $n |
                ([($o | keys[]?), ($n | keys[]?)] | unique)[] as $k |
                select(($o | has($k)) and ($n | has($k)) and ($o[$k] != $n[$k])) |
                "\(section)|\($k)|\($o[$k])|\($n[$k])";

              [
                changed_specs("dependencies"),
                changed_specs("devDependencies"),
                changed_specs("optionalDependencies"),
                changed_specs("peerDependencies"),
                changed_specs("overrides")
              ]
              | .[]
            ' package.json)

            if [ -n "$DOWNGRADE_ENTRIES" ]; then
              while IFS="|" read -r SECTION PKG OLD_VER NEW_VER; do
                [ -z "$SECTION" ] && continue

                OLD_BASE=$(echo "$OLD_VER" | sed -E 's/^[^0-9]*//; s/[^0-9.].*$//')
                NEW_BASE=$(echo "$NEW_VER" | sed -E 's/^[^0-9]*//; s/[^0-9.].*$//')

                if [ -n "$OLD_BASE" ] && [ -n "$NEW_BASE" ]; then
                  LOWEST=$(printf '%s\n%s\n' "$OLD_BASE" "$NEW_BASE" | sort -V | head -n1)
                  if [ "$LOWEST" = "$NEW_BASE" ] && [ "$NEW_BASE" != "$OLD_BASE" ]; then
                    echo "Downgrade blocked: [$SECTION] $PKG: $OLD_VER -> $NEW_VER"
                    jq --arg sec "$SECTION" --arg pkg "$PKG" --arg ver "$OLD_VER" \
                      '.[$sec][$pkg]=$ver' \
                      package.json > package.tmp.json && mv package.tmp.json package.json
                    DOWNGRADE_DETECTED=true
                  fi
                fi
              done <<< "$DOWNGRADE_ENTRIES"
            fi

            if [ "$DOWNGRADE_DETECTED" = true ]; then
              echo "Reinstalling after downgrade rollback..."
              npm install
            fi

            if ! git diff --quiet package.json package-lock.json; then
              echo "--------------------------------------"
              echo "4. Validate changes"
              echo "--------------------------------------"

              PKG_DIFF=false
              LOCK_DIFF=false

              if ! git diff --quiet package.json; then
                PKG_DIFF=true
              fi

              if ! git diff --quiet package-lock.json; then
                LOCK_DIFF=true
              fi

              VALIDATED=false

              if npm run | grep -q " test"; then
                if npm run test; then
                  echo "Tests passed."
                  VALIDATED=true
                else
                  echo "Tests failed. Reverting."
                  git restore package.json package-lock.json
                fi
              else
                echo "No test script defined. Accepting changes."
                VALIDATED=true
              fi

              if [ "$VALIDATED" = true ]; then
                ANY_CHANGES=true
                echo "- $SERVICE_DIR" >> "$SUMMARY_FILE"

                UPDATED_DEPS=$(jq -r --slurpfile old "$ORIGINAL_PKG" '
                  def changes(old; new):
                    (old // {}) as $old |
                    (new // {}) as $new |
                    ([($old | keys[]?), ($new | keys[]?)] | unique)[] as $key |
                    if (($old[$key] // null) == ($new[$key] // null)) then
                      empty
                    elif ($new | has($key) | not) then
                      "\($key): REMOVED (was \($old[$key]))"
                    elif ($old | has($key) | not) then
                      "\($key): \($new[$key]) (added)"
                    else
                      "\($key): \($old[$key]) -> \($new[$key])"
                    end;

                  [
                    (changes($old[0].dependencies; .dependencies) | "dependencies|\(.)"),
                    (changes($old[0].devDependencies; .devDependencies) | "devDependencies|\(.)"),
                    (changes($old[0].optionalDependencies; .optionalDependencies) | "optionalDependencies|\(.)"),
                    (changes($old[0].peerDependencies; .peerDependencies) | "peerDependencies|\(.)"),
                    (changes($old[0].overrides; .overrides) | "overrides|\(.)")
                  ]
                  | map(select(length > 0))
                  | .[]
                ' package.json)

                if [ -n "$UPDATED_DEPS" ]; then
                  echo "  Updated dependencies:" >> "$SUMMARY_FILE"
                  echo "$UPDATED_DEPS" | while IFS="|" read -r SECTION ENTRY; do
                    case "$SECTION" in
                      dependencies)
                        echo "    [dependencies] $ENTRY" >> "$SUMMARY_FILE"
                        ;;
                      devDependencies)
                        echo "    [devDependencies] $ENTRY" >> "$SUMMARY_FILE"
                        ;;
                      optionalDependencies)
                        echo "    [optionalDependencies] $ENTRY" >> "$SUMMARY_FILE"
                        ;;
                      peerDependencies)
                        echo "    [peerDependencies] $ENTRY" >> "$SUMMARY_FILE"
                        ;;
                      overrides)
                        echo "    [overrides] $ENTRY" >> "$SUMMARY_FILE"
                        ;;
                    esac
                  done
                elif [ "$LOCK_DIFF" = true ] && [ "$PKG_DIFF" = false ]; then
                  echo "  Transitive dependencies updated (lockfile only)." >> "$SUMMARY_FILE"
                elif [ "$PKG_DIFF" = true ]; then
                  echo "  package.json updated (no dependency section changes detected)." >> "$SUMMARY_FILE"
                fi

                echo "" >> "$SUMMARY_FILE"
              fi
            else
              echo "No dependency changes."
            fi

            rm -f "$AUDIT_FILE" "$DIRECT_FILE" "$OVERRIDE_CANDIDATES_FILE" "$ORIGINAL_PKG"
            popd > /dev/null
          done

          if [ "$ANY_CHANGES" = true ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "summary<<EOF" >> $GITHUB_OUTPUT
            cat "$SUMMARY_FILE" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure git user
        if: steps.fix.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Stage dependency files only
        if: steps.fix.outputs.changed == 'true'
        run: |
          git add $(find services -type f -name "package.json" -not -path "*/node_modules/*")
          git add $(find services -type f -name "package-lock.json" -not -path "*/node_modules/*")

      - name: Create or update Pull Request
        if: steps.fix.outputs.changed == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v5
        with:
          branch: chore/npm-audit
          base: main
          commit-message: "chore(security): automated npm audit fixes"
          title: "${{ inputs.jira_story != '' && format('{0}: chore(security): automated npm audit fixes', inputs.jira_story) || 'chore(security): automated npm audit fixes' }}"
          body: |
            Automated npm audit remediation.

            ${{ steps.fix.outputs.summary }}

            ${{ inputs.enable_auto_merge && 'Auto-merge is enabled for this PR after CI checks pass.' || 'Auto-merge is disabled for this PR. Please review and merge manually.' }}
          labels: |
            security
            automated
          delete-branch: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        if: steps.fix.outputs.changed == 'true' && inputs.enable_auto_merge
        run: |
          gh pr merge --auto --squash "${{ steps.cpr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
