name: NPM Audit Automation (Recursive - Hybrid)

on:
  workflow_call:

jobs:
  audit-and-fix:
    runs-on: ubuntu-latest

    concurrency:
      group: npm-audit-${{ github.repository }}
      cancel-in-progress: true

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Audit, fix (safe + force), and validate services
        id: fix
        run: |
          echo "Starting hybrid npm audit fix..."

          ANY_CHANGES=false

          for file in $(find ./services -type f -name 'package.json' -not -path '*/node_modules/*'); do
            SERVICE_DIR=$(dirname "$file")

            echo "--------------------------------------"
            echo "Processing $SERVICE_DIR"
            echo "--------------------------------------"

            pushd "$SERVICE_DIR"

            if [ ! -f package-lock.json ]; then
              echo "No package-lock.json found. Skipping."
              popd
              continue
            fi

            npm ci

            echo "Attempting safe fix..."
            npm audit fix || true

            if git diff --quiet package.json package-lock.json; then
              echo "No safe changes. Attempting force fix..."
              npm audit fix --force || true
            fi

            if git diff --quiet package.json package-lock.json; then
              echo "No dependency changes for $SERVICE_DIR"
              popd
              continue
            fi

            echo "Dependency changes detected."

            echo "Checking for test script..."
            if npm run | grep -q " test"; then
              echo "Running tests..."
              if npm run test; then
                echo "Tests passed."
                ANY_CHANGES=true
              else
                echo "Tests FAILED — reverting changes."
                git restore package.json package-lock.json
              fi
            else
              echo "No test script defined — accepting changes."
              ANY_CHANGES=true
            fi

            popd
          done

          if [ "$ANY_CHANGES" = true ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "No valid changes to commit."
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure git user
        if: steps.fix.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Stage only dependency definition files
        if: steps.fix.outputs.changed == 'true'
        run: |
          git add $(find services -type f -name "package.json" -not -path "*/node_modules/*")
          git add $(find services -type f -name "package-lock.json" -not -path "*/node_modules/*")

      - name: Create or update Pull Request
        if: steps.fix.outputs.changed == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v5
        with:
          branch: chore/npm-audit
          base: main
          commit-message: "chore(security): automated npm audit fixes (hybrid)"
          title: "chore(security): automated npm audit fixes"
          body: |
            🤖 Automated npm audit remediation (Hybrid Mode).

            - Attempted safe fix first
            - Attempted force fix if required
            - Executed npm run test per service
            - Reverted services with failing tests
            - Only validated fixes committed

            This PR will auto-merge once all required CI checks pass.
          labels: |
            security
            automated
          delete-branch: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        if: steps.fix.outputs.changed == 'true'
        run: |
          gh pr merge --auto --squash "${{ steps.cpr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
