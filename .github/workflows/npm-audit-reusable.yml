name: NPM Audit Automation (Recursive - Hybrid+Dynamic)

on:
  workflow_call:

jobs:
  audit-and-fix:
    runs-on: ubuntu-latest

    concurrency:
      group: npm-audit-${{ github.repository }}
      cancel-in-progress: true

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Audit, fix, override, and validate services
        id: fix
        run: |
          echo "Starting npm audit remediation..."

          ANY_CHANGES=false

          for file in $(find ./services -type f -name 'package.json' -not -path '*/node_modules/*'); do
            SERVICE_DIR=$(dirname "$file")

            echo "--------------------------------------"
            echo "Processing $SERVICE_DIR"
            echo "--------------------------------------"

            pushd "$SERVICE_DIR"

            if [ ! -f package-lock.json ]; then
              echo "No package-lock.json found. Skipping."
              popd
              continue
            fi

            npm ci

            echo "1. Safe fix"
            npm audit fix || true
            echo "--------------------------------------"
            echo "2. Force fix (if needed)"
            echo "--------------------------------------"
            if git diff --quiet package.json package-lock.json; then
              npm audit fix --force || true
            fi

            if ! git diff --quiet package.json package-lock.json; then
              echo "--------------------------------------"
              echo "3. Validate changes"
              echo "--------------------------------------"

              if npm run | grep -q " test"; then
                if npm run test; then
                  echo "Tests passed."
                  ANY_CHANGES=true
                  popd
                  continue
                else
                  echo "Tests failed. Reverting changes."
                  git restore package.json package-lock.json
                fi
              else
                echo "No test script defined. Accepting changes."
                ANY_CHANGES=true
                popd
                continue
              fi
            fi

            echo "--------------------------------------"
            echo "4. Check remaining vulnerabilities"
            echo "--------------------------------------"
            npm audit --json > audit.json || true

            REMAINING=$(jq '.metadata.vulnerabilities.total' audit.json)

            if [ "$REMAINING" -gt 0 ]; then
                echo "Applying dynamic overrides"

                jq -r '
                .vulnerabilities
                | to_entries[]
                | select(.value.fixAvailable == true and .value.isDirect == false)
                | .key
                ' audit.json > override-packages.txt

              if [ -s override-packages.txt ]; then
                while read PKG; do
                  LATEST=$(npm view "$PKG" version 2>/dev/null)
                  if [ -n "$LATEST" ]; then
                    echo "Override $PKG -> ^$LATEST"
                    jq --arg pkg "$PKG" --arg ver "^$LATEST" \
                      '.overrides[$pkg]=$ver' \
                      package.json > package.tmp.json && mv package.tmp.json package.json
                  fi
                done < override-packages.txt

                rm -rf node_modules package-lock.json
                npm install

                echo "Validate after override"
                if npm run | grep -q " test"; then
                  if npm run test; then
                    echo "Tests passed with overrides."
                    ANY_CHANGES=true
                  else
                    echo "Tests failed after override. Reverting."
                    git restore package.json package-lock.json
                  fi
                else
                  echo "No test script defined. Accepting overrides."
                  ANY_CHANGES=true
                fi
              else
                echo "No auto-fixable vulnerabilities."
              fi
            fi

            popd
          done

          if [ "$ANY_CHANGES" = true ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure git user
        if: steps.fix.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Stage only dependency definition files
        if: steps.fix.outputs.changed == 'true'
        run: |
          git add $(find services -type f -name "package.json" -not -path "*/node_modules/*")
          git add $(find services -type f -name "package-lock.json" -not -path "*/node_modules/*")

      - name: Create or update Pull Request
        if: steps.fix.outputs.changed == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v5
        with:
          branch: chore/npm-audit
          base: main
          commit-message: "chore(security): automated npm audit fixes"
          title: "chore(security): automated npm audit fixes"
          body: |
            Automated npm audit remediation.

            - Safe fix attempted
            - Force fix attempted
            - Dynamic overrides applied when required
            - npm run test executed per service
            - Reverted services with failing tests
            - Only validated fixes committed

            This PR will auto-merge once CI checks pass.
          labels: |
            security
            automated
          delete-branch: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        if: steps.fix.outputs.changed == 'true'
        run: |
          gh pr merge --auto --squash "${{ steps.cpr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
