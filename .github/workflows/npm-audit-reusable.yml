name: NPM Audit Automation (Recursive - Hybrid Optimized)

on:
  workflow_call:

jobs:
  audit-and-fix:
    runs-on: ubuntu-latest

    concurrency:
      group: npm-audit-${{ github.repository }}
      cancel-in-progress: true

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Audit, fix, override and validate services
        id: fix
        run: |
          echo "Starting npm audit remediation..."

          ANY_CHANGES=false
          SUMMARY_FILE=$(mktemp)
          echo "### Services Updated" > "$SUMMARY_FILE"
          echo "" >> "$SUMMARY_FILE"

          for file in $(find ./services -type f -name 'package.json' -not -path '*/node_modules/*'); do
            SERVICE_DIR=$(dirname "$file")

            echo "--------------------------------------"
            echo "Processing $SERVICE_DIR"
            echo "--------------------------------------"

            pushd "$SERVICE_DIR"

            if [ ! -f package-lock.json ]; then
              echo "No package-lock.json found. Skipping."
              popd
              continue
            fi

            npm ci

            # Create isolated temp files
            AUDIT_FILE=$(mktemp)
            DIRECT_FILE=$(mktemp)
            OVERRIDE_FILE=$(mktemp)

            echo "--------------------------------------"
            echo "Initial audit check"
            echo "--------------------------------------"

            npm audit --json > "$AUDIT_FILE" || true
            TOTAL=$(jq '.metadata.vulnerabilities.total' "$AUDIT_FILE")

            if [ "$TOTAL" -eq 0 ]; then
              echo "No vulnerabilities found. Skipping service."
              popd
              continue
            fi

            echo "--------------------------------------"
            echo "1. Safe fix"
            echo "--------------------------------------"

            npm audit fix || true

            npm audit --json > "$AUDIT_FILE" || true
            TOTAL=$(jq '.metadata.vulnerabilities.total' "$AUDIT_FILE")

            if [ "$TOTAL" -gt 0 ]; then
              echo "--------------------------------------"
              echo "2. Force fix (devDependencies only)"
              echo "--------------------------------------"

              ALLOW_FORCE=true

              jq -r '
                .vulnerabilities
                | to_entries[]
                | select(.value.isDirect == true)
                | .key
              ' "$AUDIT_FILE" > "$DIRECT_FILE"

              while read PKG; do
                if jq -e --arg pkg "$PKG" '.devDependencies | has($pkg)' package.json > /dev/null; then
                  echo "$PKG is devDependency."
                else
                  echo "$PKG is production dependency. Blocking force fix."
                  ALLOW_FORCE=false
                fi
              done < "$DIRECT_FILE"

              if [ "$ALLOW_FORCE" = true ]; then
                npm audit fix --force || true
              else
                echo "Force fix skipped."
              fi
            fi

            npm audit --json > "$AUDIT_FILE" || true
            TOTAL=$(jq '.metadata.vulnerabilities.total' "$AUDIT_FILE")

            if [ "$TOTAL" -gt 0 ]; then
              echo "--------------------------------------"
              echo "3. Dynamic override (devDependencies only)"
              echo "--------------------------------------"

              OVERRIDE_APPLIED=false

              jq -r '
                .vulnerabilities
                | to_entries[]
                | select(.value.fixAvailable == true and .value.isDirect == false)
                | .key
              ' "$AUDIT_FILE" > "$OVERRIDE_FILE"

              if [ -s "$OVERRIDE_FILE" ]; then
                while read PKG; do
                  if jq -e --arg pkg "$PKG" '.devDependencies | has($pkg)' package.json > /dev/null; then
                    LATEST=$(npm view "$PKG" version 2>/dev/null)
                    if [ -n "$LATEST" ]; then
                      echo "Override $PKG -> ^$LATEST"
                      jq --arg pkg "$PKG" --arg ver "^$LATEST" \
                        '.overrides[$pkg]=$ver' \
                        package.json > package.tmp.json && mv package.tmp.json package.json
                      OVERRIDE_APPLIED=true
                    fi
                  else
                    echo "$PKG not in devDependencies. Skipping override."
                  fi
                done < "$OVERRIDE_FILE"

                if [ "$OVERRIDE_APPLIED" = true ]; then
                  echo "Reinstalling with overrides..."
                  npm install
                else
                  echo "No overrides applied. Skipping reinstall."
                fi
              else
                echo "No override candidates."
              fi
            fi

            if ! git diff --quiet package.json package-lock.json; then
              echo "--------------------------------------"
              echo "4. Validate changes"
              echo "--------------------------------------"

              if npm run | grep -q " test"; then
                if npm run test; then
                  echo "Tests passed."
                  ANY_CHANGES=true

                  echo "- $SERVICE_DIR" >> "$SUMMARY_FILE"
                  echo "  Changed dependencies:" >> "$SUMMARY_FILE"

                  git diff package.json package-lock.json \
                    | grep '^+' \
                    | grep -E '"dependencies"|"devDependencies"|": "' \
                    | sed 's/^+/    /' \
                    >> "$SUMMARY_FILE"

                  echo "" >> "$SUMMARY_FILE"
                else
                  echo "Tests failed. Reverting."
                  git restore package.json package-lock.json
                fi
              else
                echo "No test script defined. Accepting changes."
                ANY_CHANGES=true

                echo "- $SERVICE_DIR" >> "$SUMMARY_FILE"
                echo "  Changed dependencies:" >> "$SUMMARY_FILE"

                git diff package.json package-lock.json \
                  | grep '^+' \
                  | grep -E '"dependencies"|"devDependencies"|": "' \
                  | sed 's/^+/    /' \
                  >> "$SUMMARY_FILE"

                echo "" >> "$SUMMARY_FILE"
              fi
            else
              echo "No dependency changes."
            fi

            # Cleanup temp files
            rm -f "$AUDIT_FILE" "$DIRECT_FILE" "$OVERRIDE_FILE"

            popd
          done

          if [ "$ANY_CHANGES" = true ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "summary<<EOF" >> $GITHUB_OUTPUT
            cat "$SUMMARY_FILE" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure git user
        if: steps.fix.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Stage dependency files only
        if: steps.fix.outputs.changed == 'true'
        run: |
          git add $(find services -type f -name "package.json" -not -path "*/node_modules/*")
          git add $(find services -type f -name "package-lock.json" -not -path "*/node_modules/*")

      - name: Create or update Pull Request
        if: steps.fix.outputs.changed == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v5
        with:
          branch: chore/npm-audit
          base: main
          commit-message: "chore(security): automated npm audit fixes"
          title: "chore(security): automated npm audit fixes"
          body: |
            Automated npm audit remediation.

            - Safe fix applied
            - Force fix limited to devDependencies
            - Dynamic overrides limited to devDependencies
            - Test validation performed
            - Production dependencies not force-modified

            ${{ steps.fix.outputs.summary }}

            This PR will auto-merge once CI checks pass.
          labels: |
            security
            automated
          delete-branch: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        if: steps.fix.outputs.changed == 'true'
        run: |
          gh pr merge --auto --squash "${{ steps.cpr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
