name: NPM Audit Automation (Recursive)

on:
  workflow_call:

jobs:
  audit-and-fix:
    runs-on: ubuntu-latest

    concurrency:
      group: npm-audit-${{ github.repository }}
      cancel-in-progress: true

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Audit and fix all services
        id: fix
        run: |
          echo "Starting recursive npm audit fix..."

          for file in $(find ./services -type f -name 'package.json' -not -path '*/node_modules/*'); do
            SERVICE_DIR=$(dirname "$file")

            echo "--------------------------------------"
            echo "Processing $SERVICE_DIR"
            echo "--------------------------------------"

            pushd "$SERVICE_DIR"

            if [ -f package-lock.json ]; then
              echo "Running npm ci..."
              npm ci

              echo "Running npm audit fix..."
              npm audit fix || true
            else
              echo "Skipping $SERVICE_DIR (no package-lock.json found)"
            fi

            popd
          done

          if git diff --quiet; then
            echo "No changes detected."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected."
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Configure git user
        if: steps.fix.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Stage only dependency definition files
        if: steps.fix.outputs.changed == 'true'
        run: |
          git add $(find services -type f -name "package.json" -not -path "*/node_modules/*")
          git add $(find services -type f -name "package-lock.json" -not -path "*/node_modules/*")

      - name: Create or update Pull Request
        if: steps.fix.outputs.changed == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v5
        with:
          branch: chore/npm-audit
          base: main
          commit-message: "chore(security): automated npm audit fixes (all services)"
          title: "chore(security): automated npm audit fixes"
          body: |
            🤖 Automated npm audit remediation (recursive).

            - Scanned all services under ./services
            - Used npm ci (lockfile enforced)
            - Fixed production and dev dependencies
            - No --force used
            - Major upgrades require manual intervention

            This PR will auto-merge once all required CI checks pass.
          labels: |
            security
            automated
          delete-branch: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        if: steps.fix.outputs.changed == 'true'
        run: |
          echo "Enabling auto-merge..."
          gh pr merge --auto --squash "${{ steps.cpr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
